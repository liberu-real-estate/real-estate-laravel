apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: real-estate

resources:
  - ../..
  - hpa.yaml

configMapGenerator:
  - name: real-estate-config
    behavior: merge
    literals:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_LEVEL=error
      - MODULES_DEVELOPMENT=false
      - MODULES_CACHE=true

images:
  - name: liberu/real-estate
    newTag: latest
