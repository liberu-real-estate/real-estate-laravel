apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: real-estate

resources:
  - namespace.yaml
  - configmap.yaml
  - nginx-configmap.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - monitoring.yaml
  - network-policy.yaml
  - resource-quota.yaml

commonLabels:
  app: real-estate-app
  managed-by: liberu-control-panel
