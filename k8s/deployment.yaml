apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-estate-app
  namespace: real-estate
  labels:
    app: real-estate-app
    component: web
    managed-by: liberu-control-panel
    liberu.io/type: application
  annotations:
    liberu.io/control-panel-managed: "true"
    liberu.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: real-estate-app
      component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: real-estate-app
        component: web
        managed-by: liberu-control-panel
    spec:
      serviceAccountName: real-estate-sa
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z "$DB_HOST" "${DB_PORT:-3306}"; do
                echo "Waiting for database at $DB_HOST:${DB_PORT:-3306}...";
                sleep 3;
              done;
              echo "Database is ready."
          envFrom:
            - secretRef:
                name: real-estate-secrets
            - configMapRef:
                name: real-estate-config
        - name: migrations
          image: liberu/real-estate:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              php artisan migrate --force &&
              php artisan config:cache &&
              php artisan route:cache &&
              php artisan view:cache
          envFrom:
            - configMapRef:
                name: real-estate-config
            - secretRef:
                name: real-estate-secrets
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app/public
      containers:
        - name: php-fpm
          image: liberu/real-estate:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: real-estate-config
            - secretRef:
                name: real-estate-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /up
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /up
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app/public
            - name: logs
              mountPath: /var/www/html/storage/logs
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: nginx-http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: storage
              mountPath: /var/www/html/storage/app/public
              readOnly: true
          securityContext:
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: real-estate-storage-pvc
        - name: logs
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: real-estate-nginx-config
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-estate-horizon
  namespace: real-estate
  labels:
    app: real-estate-app
    component: horizon
    managed-by: liberu-control-panel
  annotations:
    liberu.io/control-panel-managed: "true"
    liberu.io/component: horizon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: real-estate-app
      component: horizon
  template:
    metadata:
      labels:
        app: real-estate-app
        component: horizon
        managed-by: liberu-control-panel
    spec:
      serviceAccountName: real-estate-sa
      containers:
        - name: horizon
          image: liberu/real-estate:latest
          imagePullPolicy: Always
          env:
            - name: CONTAINER_MODE
              value: "horizon"
          envFrom:
            - configMapRef:
                name: real-estate-config
            - secretRef:
                name: real-estate-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command: ["php", "artisan", "horizon:status"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app/public
            - name: logs
              mountPath: /var/www/html/storage/logs
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: real-estate-storage-pvc
        - name: logs
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

