apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: real-estate-network-policy
  namespace: real-estate
  labels:
    app: real-estate-app
    managed-by: liberu-control-panel
    liberu.io/type: network-policy
  annotations:
    liberu.io/control-panel-managed: "true"
spec:
  podSelector:
    matchLabels:
      app: real-estate-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from NGINX Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    # Allow health checks within the namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: real-estate
      ports:
        - protocol: TCP
          port: 8000
    # Allow intra-namespace pod communication
    - from:
        - podSelector:
            matchLabels:
              app: real-estate-app
  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow MySQL
    - to:
        - podSelector:
            matchLabels:
              app: real-estate-app
              component: mysql
      ports:
        - protocol: TCP
          port: 3306
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app: real-estate-app
              component: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow HTTPS/HTTP egress for external APIs
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    # Allow intra-namespace communication
    - to:
        - podSelector:
            matchLabels:
              app: real-estate-app
