apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: real-estate-storage-pvc
  namespace: real-estate
  labels:
    app: real-estate-app
    managed-by: liberu-control-panel
    liberu.io/type: storage
  annotations:
    liberu.io/control-panel-managed: "true"
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
