apiVersion: v1
kind: ConfigMap
metadata:
  name: real-estate-config
  namespace: real-estate
data:
  APP_NAME: "Liberu Real Estate"
  APP_ENV: "production"
  APP_DEBUG: "false"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "error"
  DB_CONNECTION: "mysql"
  DB_PORT: "3306"
  CACHE_DRIVER: "redis"
  SESSION_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  BROADCAST_DRIVER: "reverb"
  OCTANE_SERVER: "roadrunner"
  CONTAINER_MODE: "http"
  WITH_HORIZON: "true"
  WITH_SCHEDULER: "true"
  WITH_REVERB: "false"
